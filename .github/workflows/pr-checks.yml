name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      BASE_API_URL: https://dev.smetchik.pro

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      BASE_API_URL: https://dev.smetchik.pro

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:unit:coverage

      - name: Extract coverage metrics
        if: success()
        id: coverage
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const xml = fs.readFileSync('coverage/clover.xml', 'utf8');

          const metricsMatch = xml.match(
            /<metrics statements="(\d+)" coveredstatements="(\d+)" conditionals="(\d+)" coveredconditionals="(\d+)" methods="(\d+)" coveredmethods="(\d+)"/,
          );

          if (!metricsMatch) {
            throw new Error('Could not parse metrics from coverage/clover.xml');
          }

          const statements = Number.parseInt(metricsMatch[1], 10);
          const coveredStatements = Number.parseInt(metricsMatch[2], 10);
          const conditionals = Number.parseInt(metricsMatch[3], 10);
          const coveredConditionals = Number.parseInt(metricsMatch[4], 10);
          const methods = Number.parseInt(metricsMatch[5], 10);
          const coveredMethods = Number.parseInt(metricsMatch[6], 10);

          const percentage = (covered, total) =>
            total === 0 ? 100 : (covered / total) * 100;

          const lines = percentage(coveredStatements, statements).toFixed(2);
          const branches = percentage(
            coveredConditionals,
            conditionals,
          ).toFixed(2);
          const functions = percentage(coveredMethods, methods).toFixed(2);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `lines=${lines}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `branches=${branches}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `functions=${functions}\n`);
          NODE

      - name: Comment coverage in PR
        if: github.event_name == 'pull_request' && success()
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          COVERAGE_LINES: ${{ steps.coverage.outputs.lines }}
          COVERAGE_BRANCHES: ${{ steps.coverage.outputs.branches }}
          COVERAGE_FUNCTIONS: ${{ steps.coverage.outputs.functions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- unit-coverage-report -->';
            const body = [
              marker,
              '### Unit Coverage',
              `- Lines: **${process.env.COVERAGE_LINES}%**`,
              `- Branches: **${process.env.COVERAGE_BRANCHES}%**`,
              `- Functions: **${process.env.COVERAGE_FUNCTIONS}%**`,
              '',
              `[Workflow run](${process.env.RUN_URL}) · Artifact: \`unit-coverage\``,
            ].join('\n');

            const issueNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    env:
      PW_BASE_URL: http://127.0.0.1:4000
      BASE_API_URL: http://127.0.0.1:4000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run e2e
