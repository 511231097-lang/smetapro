basePath: /api/v1
definitions:
  auth.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 255
        type: string
    required:
    - email
    type: object
  auth.LoginRequest:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.MessageResponse:
    properties:
      email:
        type: string
      message:
        type: string
      pin:
        type: string
    type: object
  auth.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        maxLength: 64
        type: string
    required:
    - email
    - password
    - phone
    type: object
  auth.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 255
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  auth.SuccessResponse:
    properties:
      user:
        $ref: '#/definitions/auth.UserResponse'
    type: object
  auth.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
      phone:
        type: string
      roles:
        items:
          type: string
        type: array
      surname:
        type: string
      updated_at:
        type: string
    type: object
  auth.VerifyRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 255
        type: string
    required:
    - code
    - email
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
      phone:
        type: string
      roles:
        items:
          type: string
        type: array
      surname:
        type: string
      updated_at:
        type: string
    type: object
  profile.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  profile.MessageResponse:
    properties:
      message:
        type: string
    type: object
  profile.SuccessResponse:
    properties:
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  profile.UpdateProfileRequest:
    properties:
      name:
        maxLength: 255
        type: string
      phone:
        maxLength: 64
        type: string
      surname:
        maxLength: 255
        type: string
    type: object
  tools.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
  workspaces.CreateInviteRequest:
    properties:
      role_code:
        maxLength: 50
        type: string
    required:
    - role_code
    type: object
  workspaces.CreateRequest:
    properties:
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - name
    type: object
  workspaces.CreateRoleRequest:
    properties:
      code:
        maxLength: 50
        type: string
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 100
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - code
    - name
    type: object
  workspaces.InvitePreviewResponse:
    properties:
      expires_at:
        type: string
      member_count:
        type: integer
      role:
        $ref: '#/definitions/workspaces.MemberRoleResponse'
      workspace_description:
        type: string
      workspace_name:
        type: string
    type: object
  workspaces.InviteResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      role:
        $ref: '#/definitions/workspaces.MemberRoleResponse'
      token:
        type: string
      use_count:
        type: integer
    type: object
  workspaces.ListResponse:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
      workspaces:
        items:
          $ref: '#/definitions/workspaces.WorkspaceResponse'
        type: array
    type: object
  workspaces.MemberResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        $ref: '#/definitions/workspaces.MemberRoleResponse'
      surname:
        type: string
      telegram:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      workspace_id:
        type: string
    type: object
  workspaces.MemberRoleResponse:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: integer
      is_system:
        type: boolean
      name:
        type: string
    type: object
  workspaces.MembersListResponse:
    properties:
      limit:
        type: integer
      members:
        items:
          $ref: '#/definitions/workspaces.MemberResponse'
        type: array
      offset:
        type: integer
      total:
        type: integer
    type: object
  workspaces.PermissionResponse:
    properties:
      code:
        type: string
      description:
        type: string
      name:
        type: string
    type: object
  workspaces.PermissionsListResponse:
    properties:
      permissions:
        items:
          $ref: '#/definitions/workspaces.PermissionResponse'
        type: array
    type: object
  workspaces.RoleResponse:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: integer
      is_system:
        type: boolean
      members_count:
        type: integer
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    type: object
  workspaces.RolesListResponse:
    properties:
      roles:
        items:
          $ref: '#/definitions/workspaces.RoleResponse'
        type: array
    type: object
  workspaces.SetRolePermissionsRequest:
    properties:
      permissions:
        items:
          type: string
        type: array
    type: object
  workspaces.SingleInvitePreviewResponse:
    properties:
      invite:
        $ref: '#/definitions/workspaces.InvitePreviewResponse'
    type: object
  workspaces.SingleInviteResponse:
    properties:
      invite:
        $ref: '#/definitions/workspaces.InviteResponse'
    type: object
  workspaces.SingleMemberResponse:
    properties:
      member:
        $ref: '#/definitions/workspaces.MemberResponse'
    type: object
  workspaces.SingleRoleResponse:
    properties:
      role:
        $ref: '#/definitions/workspaces.RoleResponse'
    type: object
  workspaces.SingleWorkspaceResponse:
    properties:
      workspace:
        $ref: '#/definitions/workspaces.WorkspaceResponse'
    type: object
  workspaces.UpdateMemberProfileRequest:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      phone:
        maxLength: 20
        type: string
      position:
        maxLength: 200
        type: string
      surname:
        maxLength: 255
        type: string
      telegram:
        type: string
    type: object
  workspaces.UpdateMemberRoleRequest:
    properties:
      role_code:
        maxLength: 50
        type: string
      role_id:
        type: integer
    type: object
  workspaces.UpdateRequest:
    properties:
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - name
    type: object
  workspaces.UpdateRoleRequest:
    properties:
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 100
        type: string
    type: object
  workspaces.WorkspaceResponse:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      id:
        type: string
      members_count:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8888
info:
  contact: {}
  description: HTTP API сервиса smethick-pro.
  title: Smetchik Pro API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Requests password reset code. Always returns generic success message.
      parameters:
      - description: Forgot password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      summary: Forgot password (step 1)
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user and sets access_token + refresh_token cookies
        on success.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      summary: Login with email/password
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes current refresh token and clears auth cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      - RefreshCookieAuth: []
      summary: Logout
      tags:
      - Auth
  /auth/logout-all:
    post:
      consumes:
      - application/json
      description: Revokes all refresh tokens for current user and clears auth cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Logout from all sessions
      tags:
      - Auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Returns current authenticated user profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Get current user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates refresh token and returns new auth cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - RefreshCookieAuth: []
      summary: Refresh tokens
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Sends verification code to email. In local/dev mode response includes
        pin.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      summary: Register (step 1)
      tags:
      - Auth
  /auth/register/verify:
    post:
      consumes:
      - application/json
      description: Verifies code, creates account, and signs user in.
      parameters:
      - description: Verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      summary: Register verification (step 2)
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets password by verification code and signs user in.
      parameters:
      - description: Reset password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      summary: Reset password (step 2)
      tags:
      - Auth
  /invite/{token}:
    get:
      description: Returns workspace preview for invite token.
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workspaces.SingleInvitePreviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Preview invite
      tags:
      - Workspaces
    post:
      description: Adds current user to workspace by invite token.
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workspaces.SingleMemberResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Accept invite
      tags:
      - Workspaces
  /profile:
    delete:
      description: Soft-deletes current user, created workspaces and revokes all sessions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/profile.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Delete account
      tags:
      - Profile
    get:
      consumes:
      - application/json
      description: Returns current authenticated user profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/profile.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Get current profile
      tags:
      - Profile
    patch:
      consumes:
      - application/json
      description: Updates current authenticated user profile fields.
      parameters:
      - description: Profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/profile.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/profile.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Update current profile
      tags:
      - Profile
  /profile/password:
    patch:
      consumes:
      - application/json
      description: Changes current authenticated user password using old password.
      parameters:
      - description: Password change payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/profile.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/profile.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Change current password
      tags:
      - Profile
  /workspaces:
    get:
      consumes:
      - application/json
      description: Returns paginated list of workspaces available for current user.
      parameters:
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workspaces.ListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: List workspaces
      tags:
      - Workspaces
    post:
      consumes:
      - application/json
      description: Creates a workspace and assigns current user as owner.
      parameters:
      - description: Create workspace payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/workspaces.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/workspaces.SingleWorkspaceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Create workspace
      tags:
      - Workspaces
  /workspaces/{workspace_id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes workspace for current member.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Delete workspace
      tags:
      - Workspaces
    get:
      consumes:
      - application/json
      description: Returns workspace by id for current member.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workspaces.SingleWorkspaceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
      security:
      - AccessCookieAuth: []
      summary: Get workspace
      tags:
      - Workspaces
    put:
      consumes:
      - application/json
      description: Updates workspace fields for current member.
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      - description: Update workspace payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/workspaces.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workspaces.SingleWorkspaceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/tools.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
